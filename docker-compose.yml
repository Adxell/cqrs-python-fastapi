services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cqrs_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql+asyncpg://user:password@postgres:5432/cqrs_db
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      - postgres
      - mongo

volumes:
  pg_data:
  mongo_data:
